<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>화면 정의서 생성기 - 로그인</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#F4F4F5;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:16px;padding:40px 32px;width:360px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.logo{font-size:28px;font-weight:900;color:#18181B;letter-spacing:-1px;margin-bottom:8px;}
.title{font-size:18px;font-weight:700;color:#18181B;margin-bottom:8px;}
.sub{font-size:13px;color:#71717A;margin-bottom:28px;line-height:1.5;}
.google-btn-wrap{display:flex;justify-content:center;margin-bottom:4px;}
.status{display:none;padding:14px;border-radius:10px;font-size:13px;line-height:1.5;margin-top:16px;white-space:pre-line;}
.status.success{background:#F0FDF4;color:#15803D;border:1px solid #86EFAC;}
.status.error{background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5;}
.user-card{display:none;align-items:center;gap:12px;padding:14px;background:#F4F4F5;border-radius:10px;margin-bottom:16px;}
.user-avatar{width:40px;height:40px;border-radius:50%;background:#18181B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;}
.user-info{text-align:left;}
.user-name{font-size:14px;font-weight:600;color:#18181B;}
.user-email{font-size:12px;color:#71717A;}
.btn-close{width:100%;padding:12px;border:none;border-radius:10px;background:#18181B;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s;}
.btn-close:hover{background:#27272A;}
.divider{margin:24px 0;border:none;border-top:1px solid #E4E4E7;}
.footer{margin-top:24px;font-size:11px;color:#A1A1AA;}
.spinner{display:none;width:20px;height:20px;border:2px solid #E4E4E7;border-top-color:#18181B;border-radius:50%;animation:spin .65s linear infinite;margin:16px auto 0;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">◈</div>
  <div class="title">화면 정의서 생성기</div>
  <div class="sub">Google 계정으로 로그인하여<br>모든 기기에서 동기화하세요.</div>

  <div class="user-card" id="user-card">
    <div class="user-avatar" id="user-avatar">?</div>
    <div class="user-info">
      <div class="user-name" id="user-name-el"></div>
      <div class="user-email" id="user-email-el"></div>
    </div>
  </div>

  <!-- Google Identity Services 버튼 -->
  <div class="google-btn-wrap" id="google-btn-wrap">
    <div id="google-signin-btn"></div>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="status" id="status-msg"></div>

  <button class="btn-close" id="btn-close" style="display:none" onclick="window.close()">
    피그마로 돌아가기 (탭 닫기)
  </button>

  <hr class="divider"/>
  <div class="footer">로그인 후 피그마 플러그인으로 돌아가세요.</div>
</div>

<script>
// ── URL 파라미터 ──────────────────────────────────────────────
var params = new URLSearchParams(window.location.search);
var STATE_TOKEN = params.get('state') || '';

// ── Google Client ID (발급 후 여기에 붙여넣기) ──────────────────
var GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

// ── GSI 초기화 ────────────────────────────────────────────────
window.addEventListener('load', function() {
  if (typeof google === 'undefined') {
    showStatus('Google 스크립트 로드 실패.\n네트워크를 확인하세요.', 'error');
    return;
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleCredentialResponse,
    auto_select: false,
    cancel_on_tap_outside: true,
  });
  google.accounts.id.renderButton(
    document.getElementById('google-signin-btn'),
    {
      type: 'standard',
      theme: 'outline',
      size: 'large',
      text: 'continue_with',
      locale: 'ko',
      width: 296,
    }
  );
});

// ── Google 로그인 콜백 ────────────────────────────────────────
function handleCredentialResponse(response) {
  try {
    // JWT payload 디코딩 (서명 검증은 서버에서 처리하므로 여기선 단순 디코딩)
    var payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    var name = payload.name || payload.email.split('@')[0];
    var email = payload.email;

    document.getElementById('google-btn-wrap').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';

    // 서버에 인증 결과 저장
    fetch('/api/auth-save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state: STATE_TOKEN, user: { name: name, email: email }, isPaid: false }),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      document.getElementById('spinner').style.display = 'none';
      if (data.ok) {
        showUser(name, email);
      } else {
        document.getElementById('google-btn-wrap').style.display = 'flex';
        showStatus('저장 실패: ' + (data.error || '알 수 없는 오류'), 'error');
      }
    })
    .catch(function(err) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('google-btn-wrap').style.display = 'flex';
      showStatus('서버 연결 오류: ' + err.message, 'error');
    });
  } catch(e) {
    showStatus('로그인 처리 중 오류가 발생했습니다.', 'error');
  }
}

function showUser(name, email) {
  document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('user-name-el').textContent = name;
  document.getElementById('user-email-el').textContent = email;
  document.getElementById('user-card').style.display = 'flex';
  document.getElementById('btn-close').style.display = 'block';
  showStatus('로그인 완료! 피그마 플러그인이 자동으로 업데이트됩니다.\n이 탭을 닫아도 됩니다.', 'success');
}

function showStatus(msg, type) {
  var el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}
</script>
</body>
</html>
